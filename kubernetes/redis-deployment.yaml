apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-redis
  namespace: enterprise-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: enterprise-redis

  template:
    metadata:
      labels:
        app: enterprise-redis

    spec:
      containers:
        - name: redis

          image: redis:7-alpine

          ports:
            - containerPort: 6379

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "250m"

          livenessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 6379

            initialDelaySeconds: 5
            periodSeconds: 5 