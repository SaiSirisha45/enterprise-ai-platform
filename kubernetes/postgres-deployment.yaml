apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-postgres
  namespace: enterprise-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: enterprise-postgres

  template:
    metadata:
      labels:
        app: enterprise-postgres

    spec:
      containers:
        - name: postgres

          image: postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: enterprise_ai

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_PASSWORD
              value: postgres

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          emptyDir: {} 