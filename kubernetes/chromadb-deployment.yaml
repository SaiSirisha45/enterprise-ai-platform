apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-chromadb
  namespace: enterprise-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: enterprise-chromadb

  template:
    metadata:
      labels:
        app: enterprise-chromadb

    spec:
      containers:
        - name: chromadb

          image: chromadb/chroma:latest

          ports:
            - containerPort: 8000

          volumeMounts:
            - name: chromadb-storage
              mountPath: /chroma/chroma

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "1Gi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8000

            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8000

            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: chromadb-storage
          emptyDir: {} 