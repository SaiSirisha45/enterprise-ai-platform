apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: enterprise-ai-ingress
  namespace: enterprise-ai

spec:

  rules:

  - host: enterprise-ai.local

    http:

      paths:

      - path: /api

        pathType: Prefix

        backend:

          service:

            name: backend-service

            port:

              number: 8000


      - path: /

        pathType: Prefix

        backend:

          service:

            name: frontend-service

            port:

              number: 5173 