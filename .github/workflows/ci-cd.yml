name: Enterprise AI Platform CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  VERSION: 1.0.${{ github.run_number }}

jobs:

  build-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Backend Lint
        run: |
          pip install flake8
          cd backend
          flake8 .

      - name: Run Backend Tests
        run: |
          cd backend
          pytest tests/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd enterprise-ai-ui
          npm install

      - name: Run Frontend Tests
        run: |
          cd enterprise-ai-ui
          npm test -- --watchAll=false

  docker-build:

    needs: build-test
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
          -t enterprise-backend:${{ env.VERSION }} \
          ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build \
          -t enterprise-frontend:${{ env.VERSION }} \
          ./enterprise-ai-ui

      - name: Docker Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enterprise-backend:${{ env.VERSION }}

  release:

    needs: docker-build
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          echo "# Enterprise AI Platform Release" > docs/release_notes.md
          echo "" >> docs/release_notes.md
          echo "Version: $VERSION" >> docs/release_notes.md
          echo "Build: $GITHUB_RUN_NUMBER" >> docs/release_notes.md
          echo "Commit: $GITHUB_SHA" >> docs/release_notes.md
          echo "Date: $(date)" >> docs/release_notes.md

      - name: Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: docs/release_notes.md

  deploy:

    needs: release
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Backup Database
        run: |
          chmod +x scripts/backup.sh
          ./scripts/backup.sh

      - name: Run Database Migration
        run: |
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f kubernetes/

      - name: Wait For Rollout
        run: |
          kubectl rollout status deployment/enterprise-backend -n enterprise-ai

      - name: Smoke Tests
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh

      - name: Automatic Rollback
        if: failure()
        run: |
          chmod +x scripts/rollback.sh
          ./scripts/rollback.sh

      - name: Notify Team
        run: |
          echo "Deployment Successful"
          echo "Version: $VERSION" 